<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aaroha Academy case snapshot by Latent Foundry." />
    <title>Latent Foundry | Aaroha Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/styles.css" />
  </head>
  <body data-page="project" data-project-slug="aaroha-academy">
    <header class="site-header">
      <div class="container nav-shell">
        <a href="../../" class="brand">
          <span class="brand-dot" aria-hidden="true"></span>
          <span class="brand-text">Latent Foundry</span>
        </a>
        <nav class="nav-links" aria-label="Primary">
          <a href="../../">Home</a>
          <a href="../../about/">About Us</a>
          <a href="../../work/" class="active">Our Work</a>
          <a href="../../#faq">FAQ</a>
        </nav>
        <a href="../../get-started/" class="nav-cta">Get started</a>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="container panel project-shell" data-reveal>
          <a class="back-link" href="../"><- Back to work</a>
          <p class="project-meta" id="project-industry"></p>
          <h1 id="project-title"></h1>
          <p class="lead" id="project-summary"></p>

          <div class="project-detail-grid">
            <div id="project-preview" class="project-preview large"></div>
            <article class="project-side-card">
              <h2>Scope snapshot</h2>
              <p class="duration-line">Sprint length: <span id="project-duration"></span></p>
              <div id="project-tags" class="chips"></div>
              <h3>Deliverables</h3>
              <ul id="project-deliverables"></ul>
            </article>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="container" data-reveal>
          <div class="section-head inline-head">
            <h2>Related projects</h2>
            <a class="text-link-cta" href="../">View all -></a>
          </div>
          <div id="related-project-grid" class="project-grid" data-project-link-prefix="../"></div>
        </div>
      </section>
    </main>

    <script src="../../js/content.js" defer></script>
    <script src="../../js/main.js" defer></script>
  </body>
</html>
